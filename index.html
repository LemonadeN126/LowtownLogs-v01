<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下城区日志</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ========================= -->
    <!-- PAGE 1 : 引言             -->
    <!-- ========================= -->

    <div id="page1" class="page">
        <div class="title-block">
            <h1>下城区日志</h1>
            <div class="subtitle">—— 轻轨穿过那年冬天 ——</div>
        </div>

        <div class="intro-text">
            <p>下城区，地下-7层。</p>
            <p>铁皮棚房和鸽子笼交错堆叠，轻轨从头顶轰鸣而过，</p>
            <p>霓虹灯管在潮湿的空气里滋滋作响。</p>
            <p>隔壁的铁皮棚搬来了两个人——</p>
            <p>一个沉默的少年，牵着一个安静的小孩。</p>
            <p style="margin-top:16px; color:#8899bb;">你的一生，从这一天开始改变。</p>
        </div>

        <button id="enterBtn" class="btn-primary">进入下城区 →</button>
    </div>

    <!-- ========================= -->
    <!-- PAGE 2 : 创角             -->
    <!-- ========================= -->

    <div id="page2" class="page" style="display:none;">

        <h2>✦ 你是谁</h2>

        <div class="form-group">
            <label>代号 / ID</label>
            <input type="text" id="playerId" placeholder="输入你的名字或代号" maxlength="12">
        </div>

        <div class="form-group">
            <label>生存点</label>
            <div class="roll-row">
                <span id="survivalDisplay" class="stat-number">??</span>
                <button id="rollSurvival" class="btn-roll">🎲 ROLL</button>
            </div>
            <div class="hint">范围 60-100</div>
        </div>

        <div class="form-group">
            <label>San 值</label>
            <div class="roll-row">
                <span id="sanDisplay" class="stat-number">??</span>
                <button id="rollSan" class="btn-roll">🎲 ROLL</button>
            </div>
            <div class="hint">范围 60-100</div>
        </div>

        <button id="confirmBtn" class="btn-primary" disabled>确认身份 →</button>
        <div id="creationError" class="error-msg"></div>
    </div>

    <!-- ========================= -->
    <!-- PAGE 3 : 主界面           -->
    <!-- ========================= -->

    <div id="page3" class="page" style="display:none;">

        <!-- 上部：玩家信息 -->
        <div id="playerInfo">
            <div class="player-row">
                <span class="player-id" id="displayId">—</span>
                <span class="player-month" id="displayMonth">第 1 月</span>
            </div>
            <div class="stat-row">
                <div class="stat-item">
                    <span class="stat-label">生存点</span>
                    <div class="stat-bar-wrap">
                        <div class="stat-bar" id="survivalBar" style="width:60%"></div>
                    </div>
                    <span class="stat-value" id="displaySurvival">60</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">San值</span>
                    <div class="stat-bar-wrap">
                        <div class="stat-bar san-bar" id="sanBar" style="width:60%"></div>
                    </div>
                    <span class="stat-value" id="displaySan">60</span>
                </div>
            </div>
        </div>

        <!-- 中部：事件 -->
        <div id="eventPanel">
            <div id="eventContent">
                <p class="event-placeholder">加载中...</p>
            </div>
            <div id="eventOptions"></div>
            <div id="eventFeedback" class="feedback-hidden"></div>
        </div>

        <!-- 下部：三人角色卡 -->
        <div id="npcPanel">
            <div class="npc-grid">
                <!-- 老大 -->
                <div class="npc-card" data-npc="boss">
                    <div class="npc-header">
                        <span class="npc-name">老大</span>
                        <span class="npc-tag">黑手党</span>
                    </div>
                    <div class="npc-bond">
                        <span class="bond-label">好感度</span>
                        <div class="bond-bar-wrap">
                            <div class="bond-bar" id="bondBoss" style="width:0%"></div>
                        </div>
                        <span class="bond-value" id="bondBossText">0</span>
                    </div>
                    <div class="npc-status" id="bossStatus">初识</div>
                </div>

                <!-- 乌鸦 -->
                <div class="npc-card" data-npc="crow">
                    <div class="npc-header">
                        <span class="npc-name">乌鸦</span>
                        <span class="npc-tag">医生</span>
                    </div>
                    <div class="npc-bond">
                        <span class="bond-label">好感度</span>
                        <div class="bond-bar-wrap">
                            <div class="bond-bar" id="bondCrow" style="width:0%"></div>
                        </div>
                        <span class="bond-value" id="bondCrowText">0</span>
                    </div>
                    <div class="npc-status" id="crowStatus">初识</div>
                </div>

                <!-- 阿利什 -->
                <div class="npc-card" data-npc="alish">
                    <div class="npc-header">
                        <span class="npc-name">阿利什</span>
                        <span class="npc-tag">雕鸮</span>
                    </div>
                    <div class="npc-bond">
                        <span class="bond-label">好感度</span>
                        <div class="bond-bar-wrap">
                            <div class="bond-bar" id="bondAlish" style="width:0%"></div>
                        </div>
                        <span class="bond-value" id="bondAlishText">0</span>
                    </div>
                    <div class="npc-status" id="alishStatus">初识</div>
                </div>
            </div>
        </div>

        <!-- 结局弹窗 -->
        <div id="endingModal" class="modal-overlay" style="display:none;">
            <div class="modal-box ending-box">
                <h2 id="endingTitle">—</h2>
                <p id="endingDesc">—</p>
                <button id="endingRestartBtn" class="btn-primary">重新开始</button>
            </div>
        </div>

    </div>

    <!-- ========================= -->
    <!-- 碎片弹窗由 JS 动态生成，无需静态结构 -->
    <!-- ========================= -->

    <script src="script.js"></script>

</body>

</html>
